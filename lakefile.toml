name = "MaxwellWave"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MaxwellWave", "PlasmaEquations", "NavierStokes"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "2df2f0150c275ad53cb3c90f7c98ec15a56a1a67"


[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "v4.26.0"

[[lean_lib]]
name = "MaxwellWave"

[[lean_lib]]
name = "PlasmaEquations"

[[lean_lib]]
name = "NavierStokes"

[[lean_lib]]
name = "MatlibDraft"
