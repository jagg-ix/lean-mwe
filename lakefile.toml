name = "MaxwellWave"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MaxwellWave", "PlasmaEquations", "NavierStokes"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "8f9d9cff6bd728b17a24e163c9402775d9e6a365"


[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "v4.28.0"

[[lean_lib]]
name = "MaxwellWave"

[[lean_lib]]
name = "PlasmaEquations"

[[lean_lib]]
name = "NavierStokes"

[[lean_lib]]
name = "MatlibDraft"
