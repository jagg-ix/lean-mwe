name = "MaxwellWave"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MaxwellWave", "PlasmaEquations", "NavierStokes"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.29.0"

# doc-gen4 dropped on the v4.29.0 bump: it pulled an off-version
# `plausible` pin that broke `lake exe cache get` hash matching for
# the entire mathlib olean cache.  Documentation generation is not
# required for catept-main's consumption of MaxwellWave / PlasmaEquations.
# Re-add later if doc generation is needed, after verifying the
# transitive plausible pin matches mathlib's.

[[lean_lib]]
name = "MaxwellWave"

[[lean_lib]]
name = "PlasmaEquations"

[[lean_lib]]
name = "NavierStokes"

[[lean_lib]]
name = "MatlibDraft"
